<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJK RPG - Automaten</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background-color: #121c24;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #1f2833;
            border-right: 1px solid #1f2833;
        }
        header {
            background-color: #0b0c10;
            padding: 15px;
            border-bottom: 2px solid #66fcf1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { margin: 0; font-size: 16px; color: #66fcf1; text-align: center; letter-spacing: 1px; }
        .status-bar { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; font-family: monospace; }
        .ce-container { display: flex; align-items: center; gap: 8px; }
        .ce-bar-bg { width: 120px; height: 10px; background-color: #1f2833; border: 1px solid #45a29e; border-radius: 5px; overflow: hidden; }
        #ce-bar-fill { width: 100%; height: 100%; background-color: #66fcf1; transition: width 0.3s; }
        #chat-output { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; background-image: radial-gradient(#1f2833 1px, transparent 1px); background-size: 20px 20px; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .user-msg { color: #0b0c10; align-self: flex-end; background: #66fcf1; border-bottom-right-radius: 2px; box-shadow: 0 2px 5px rgba(102,252,241,0.2); }
        .ai-msg { color: #e5e5e5; align-self: flex-start; background: #1f2833; border-bottom-left-radius: 2px; border-left: 4px solid #45a29e; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .system-msg { color: #ff4d4d; font-size: 11px; text-align: center; font-style: italic; font-family: monospace; align-self: center; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 10px; }
        .input-area { display: flex; padding: 12px; background-color: #0b0c10; gap: 10px; align-items: center; }
        #player-input { flex: 1; background: #1f2833; border: 1px solid #45a29e; color: #fff; font-size: 15px; padding: 12px; border-radius: 24px; outline: none; transition: border 0.2s; }
        #player-input:focus { border-color: #66fcf1; }
        #send-btn { background: #66fcf1; border: none; color: #0b0c10; width: 44px; height: 44px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; transition: transform 0.1s; }
        #send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="game-container">
        <header>
            <h1>JJK RPG: AUTOMATEN TIMELINE</h1>
            <div class="status-bar">
                <span>RANG: <strong id="player-grade" style="color: #66fcf1;">GRAD 4</strong></span>
                <div class="ce-container">
                    <span>CE POOL:</span>
                    <div class="ce-bar-bg"><div id="ce-bar-fill"></div></div>
                    <span id="ce-text" style="color: #66fcf1;">100%</span>
                </div>
            </div>
        </header>

        <div id="chat-output">
            <div class="system-msg">Llama 3.3 70B geladen. Das Spiel läuft im unbarmherzigen Sekunden-Takt. Gib deine erste Aktion ein, um das Training mit Toji zu beginnen...</div>
        </div>

        <div class="input-area">
            <input type="text" id="player-input" placeholder="Deine exakte Sekunde...">
            <button id="send-btn">➔</button>
        </div>
    </div>

    <script>
        let cursedEnergy = 100;
        const openRouterKey = "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"; 

        const jjkRules = `
        Du bist das Backend-Spielleiter-System für ein ultra-akkurates Jujutsu Kaisen RPG. Toji ist ein reicher Olympia-Star und Grade-1-Lehrer an der Schule. Gojo und Geto sind anwesend.
        [EISERNES PACING-GESETZ]: Beschreibe NUR die physische Reaktion der Umgebung in der exakt nächsten Sekunde (Mikromanagement). Nimm NIEMALS Aktionen des Spielers vorweg! Stoppe sofort nach maximal 1-2 kurzen Sätzen.
        [UNBARMHERZIGES RPG-REGELWERK]: Kampf gegen höheren Grad ist tödlich. Spieler hat Grad 4. [AUTOMATEN]-Technik bricht bei unlösbaren/tödlichen Befehlen ab -> führt zu sofortigem Gehirn-Burnout.
        `;

        document.getElementById("send-btn").addEventListener("click", handleUserAction);
        document.getElementById("player-input").addEventListener("keypress", (e) => { if(e.key === 'Enter') handleUserAction(); });

        async function handleUserAction() {
            const inputField = document.getElementById("player-input");
            const playerText = inputField.value.trim();
            if (!playerText) return;

            appendMessage(playerText, "msg-bubble user-msg");
            inputField.value = "";

            if(playerText.toLowerCase().includes("automat") || playerText.toLowerCase().includes("befehl")) {
                cursedEnergy = Math.max(0, cursedEnergy - 15);
                updateUI();
            }

            appendMessage("Berechne Sekunde...", "system-msg");

            try {
                const response = await fetch("https://openrouter.ai", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${openRouterKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/llama-3.3-70b-instruct:free", 
                        messages: [
                            { role: "system", content: jjkRules },
                            { role: "user", content: playerText }
                        ],
                        max_tokens: 45, 
                        temperature: 0.2,
                        stop: ["Ich ", "Danach", "Du tust", "Als nächstes"]
                    })
                });

                const data = await response.json();
                
                const systemMsgs = document.querySelectorAll(".system-msg");
                if(systemMsgs.length > 0) systemMsgs[systemMsgs.length - 1].remove();
                
                appendMessage(data.choices.message.content, "msg-bubble ai-msg");

            } catch (error) {
                const systemMsgs = document.querySelectorAll(".system-msg");
                if(systemMsgs.length > 0) systemMsgs[systemMsgs.length - 1].remove();
                appendMessage("Fehler. Prüfe Internetverbindung oder API-Key.", "system-msg");
            }
        }

        function appendMessage(text, className) {
            const chatOutput = document.getElementById("chat-output");
            const msgDiv = document.createElement("div");
            msgDiv.className = className;
            msgDiv.innerText = text;
            chatOutput.appendChild(msgDiv);
            chatOutput.scrollTop = chatOutput.scrollHeight;
        }

        function updateUI() {
            document.getElementById("ce-bar-fill").style.width = `${cursedEnergy}%`;
            document.getElementById("ce-text").innerText = `${cursedEnergy}%`;
        }
    </script>
</body>
</html>
