<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJK RPG - Chronicles</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #05070a;
            color: #c5c6c7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.1s ease-out;
            position: relative;
        }
        #flash-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.1s ease-out;
        }
        .flash-damage { background-color: rgba(255, 0, 77, 0.4); box-shadow: inset 0 0 100px rgba(255,0,0,0.8); }
        .flash-cursed { background-color: rgba(102, 252, 241, 0.3); box-shadow: inset 0 0 100px rgba(102,252,241,0.6); }

        #game-container {
            width: 100%;
            max-width: 500px;
            height: 100svh;
            background-color: #0b1116;
            display: flex;
            flex-direction: column;
            border-left: 2px solid #1f2833;
            border-right: 2px solid #1f2833;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            position: relative;
        }
        header {
            background-color: #05070a;
            padding: 10px;
            border-bottom: 2px solid #66fcf1;
        }
        h1 { margin: 0; font-size: 13px; color: #66fcf1; text-align: center; letter-spacing: 1px; }
        #arc-display { text-align: center; font-size: 10px; font-family: monospace; color: #45a29e; margin-top: 2px; }
        .status-bar { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; font-family: monospace; align-items: center; }
        .ce-container { display: flex; align-items: center; gap: 6px; }
        .ce-bar-bg { width: 80px; height: 10px; background-color: #121c24; border: 1px solid #45a29e; border-radius: 3px; overflow: visible; position: relative; }
        #ce-bar-fill { width: 100%; height: 100%; background-color: #66fcf1; transition: width 0.3s; border-radius: 3px; }
        
        .potency-zone-active { background-color: #ff0055 !important; box-shadow: 0 0 15px #ff0055 !important; animation: pulse-zone 0.4s infinite alternate; }
        @keyframes pulse-zone { from { filter: brightness(1); } to { filter: brightness(1.4); } }

        #takt-timer-container { width: 100%; height: 4px; background-color: #121c24; overflow: hidden; }
        #takt-timer-fill { width: 100%; height: 100%; background-color: #ff4d4d; transition: width 0.1s linear; }
        .ce-loading { animation: pulse-ce 0.6s infinite alternate; }
        @keyframes pulse-ce { from { opacity: 1; } to { opacity: 0.4; } }

        #chat-output { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#1f2833 1px, transparent 1px); background-size: 25px 25px; }
        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-wrap: break-word; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg { color: #05070a; align-self: flex-end; background: #66fcf1; font-weight: 500; }
        .ai-msg { color: #e5e5e5; align-self: flex-start; background: #121c24; border-left: 4px solid #45a29e; }
        .system-msg { color: #ff4d4d; font-size: 11px; text-align: center; font-style: italic; font-family: monospace; align-self: center; background: rgba(5,7,10,0.8); padding: 6px 12px; border-radius: 6px; border: 1px dashed rgba(255,77,77,0.4); width: 90%; }
        
        .macro-container { display: flex; gap: 6px; padding: 6px; background-color: #05070a; overflow-x: auto; border-top: 1px solid #1f2833; }
        .macro-btn { background: #121c24; border: 1px solid #45a29e; color: #66fcf1; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-family: monospace; cursor: pointer; white-space: nowrap; }
        .macro-btn:hover { background: #66fcf1; color: #05070a; }

        .input-area { display: flex; padding: 10px; background-color: #05070a; gap: 8px; align-items: center; }
        #player-input { flex: 1; background: #121c24; border: 1px solid #45a29e; color: #fff; font-size: 14px; padding: 10px; border-radius: 8px; outline: none; }
        #send-btn { background: #66fcf1; border: none; color: #05070a; width: 40px; height: 40px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        
        #reset-btn { background: rgba(255, 77, 77, 0.2); border: 1px solid #ff4d4d; color: #ff4d4d; padding: 3px 8px; font-size: 9px; font-family: monospace; border-radius: 3px; cursor: pointer; }
        #reflex-zone { display: none; position: fixed; background: #000; border: 3px solid #ff0055; padding: 15px; border-radius: 12px; z-index: 1000; text-align: center; box-shadow: 0 0 35px #ff0055; width: 180px; }
    </style>
</head>
